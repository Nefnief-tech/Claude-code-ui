name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install

      - run: bun run build:stable

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: artifacts/
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute next version
        id: version
        run: |
          latest=$(gh release list --limit 50 --json tagName --jq '.[].tagName' | grep -oP '^2026\.\K\d+' | sort -rn | head -1 || true)
          if [ -z "$latest" ]; then
            echo "number=01" >> "$GITHUB_OUTPUT"
          else
            next=$(printf "%02d" $((10#$latest + 1)))
            echo "number=$next" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          version="2026.${{ steps.version.outputs.number }}"
          gh release create "$version" \
            --title "cc-ui $version" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
