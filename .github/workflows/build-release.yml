name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - run: bun install

      - run: bun run build:stable

      # --- Linux: Electrobun self-extracting binary ---
      # Combines the extractor + ELECTROBUN_METADATA_V1 marker + metadata JSON
      # + ELECTROBUN_ARCHIVE_V1 marker + compressed tar.zst into a single executable.
      # The Electrobun extractor handles extraction to ~/.local/share/<app-identifier>
      # and creates a desktop shortcut automatically.
      - name: Create Linux installer
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist

          APP_DIR="build/stable-linux-x64/cc-uui"
          EXTRACTOR="node_modules/electrobun/dist-linux-x64/extractor"

          # Find the tar.zst archive created by Electrobun build
          TAR_ZST=$(find "$APP_DIR/Resources" -name "*.tar.zst" | head -1)
          if [ -z "$TAR_ZST" ]; then
            echo "ERROR: No tar.zst found in build output"
            exit 1
          fi

          # Read metadata
          METADATA_JSON=$(cat "$APP_DIR/Resources/metadata.json")

          echo "Building self-extracting installer..."
          echo "  Extractor: $EXTRACTOR"
          echo "  Archive: $TAR_ZST"
          echo "  Metadata: $METADATA_JSON"

          # Combine: extractor + ELECTROBUN_METADATA_V1 + metadata + ELECTROBUN_ARCHIVE_V1 + tar.zst
          OUT="dist/cc-uui-linux-x64"
          cat "$EXTRACTOR" > "$OUT"
          printf 'ELECTROBUN_METADATA_V1' >> "$OUT"
          printf '%s' "$METADATA_JSON" >> "$OUT"
          printf 'ELECTROBUN_ARCHIVE_V1' >> "$OUT"
          cat "$TAR_ZST" >> "$OUT"
          chmod +x "$OUT"

          echo "Linux installer size: $(du -h "$OUT" | cut -f1)"

      # --- Windows: Electrobun extractor + archive in a zip ---
      # Electrobun's Windows extractor expects the exe, a matching .metadata.json,
      # and a matching .tar.zst file alongside it.
      - name: Create Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $appDir = Resolve-Path "build\stable-win-x64\cc-uui"
          $extractor = "node_modules\electrobun\dist-win-x64\extractor.exe"

          # Find the tar.zst archive
          $tarZst = Get-ChildItem "$appDir\Resources\*.tar.zst" | Select-Object -First 1
          if (-not $tarZst) {
            Write-Error "No tar.zst found in build output"
            exit 1
          }

          $metadataJson = Get-Content "$appDir\Resources\metadata.json" -Raw

          Write-Host "Building Windows installer..."
          Write-Host "  Extractor: $extractor"
          Write-Host "  Archive: $($tarZst.FullName)"
          Write-Host "  Metadata: $metadataJson"

          New-Item -ItemType Directory -Force -Path "dist","staging" | Out-Null

          $baseName = "cc-uui-windows-x64"
          $exePath = "staging\$baseName.exe"
          $metaPath = "staging\$baseName.metadata.json"
          $archivePath = "staging\$baseName.tar.zst"
          $zipPath = "dist\$baseName.zip"

          # Copy extractor as the installer exe
          Copy-Item $extractor $exePath

          # Write metadata
          Set-Content $metaPath $metadataJson

          # Copy archive
          Copy-Item $tarZst.FullName $archivePath

          # Zip staging folder into dist
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          if (Test-Path $zipPath) { Remove-Item $zipPath }
          [System.IO.Compression.ZipFile]::CreateFromDirectory("staging", $zipPath, [System.IO.Compression.CompressionLevel]::Optimal, $false)

          # Clean up staging
          Remove-Item "staging" -Recurse -Force

          $size = [math]::Round((Get-Item $zipPath).Length / 1MB, 1)
          Write-Host "Windows installer zip size: $size MB"

      - uses: actions/upload-artifact@v4
        with:
          name: build-${{ runner.os }}
          path: |
            dist/cc-uui-linux-x64
            dist/cc-uui-windows-x64.zip
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Compute next version
        id: version
        run: |
          latest=$(gh release list --limit 50 --json tagName --jq '.[].tagName' | grep -oP '^2026\.\K\d+' | sort -rn | head -1 || true)
          if [ -z "$latest" ]; then
            echo "number=01" >> "$GITHUB_OUTPUT"
          else
            next=$(printf "%02d" $((10#$latest + 1)))
            echo "number=$next" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        run: |
          version="2026.${{ steps.version.outputs.number }}"
          gh release create "$version" \
            --title "cc-ui $version" \
            --generate-notes \
            artifacts/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
